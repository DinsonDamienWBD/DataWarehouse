# =============================================================================
# DW Military-Grade Audit Pipeline
# =============================================================================
#
# GATE OVERVIEW
# -------------
# This workflow enforces 7 quality gates. The `audit-summary` job is the single
# required status check for branch protection -- it aggregates all gate results.
#
#   Gate                  | Blocks Merge When...                         | Timeout
#   ----------------------|----------------------------------------------|--------
#   build-and-test        | Build fails or any unit test fails            | 30 min
#   coyote-concurrency    | Coyote finds concurrency bugs (1000 iters)   | 60 min
#   static-analysis       | InspectCode issues > INSPECTCODE_BASELINE    | 45 min
#                         | dupFinder duplicates > DUPFINDER_BASELINE     |
#   code-coverage         | dotCover coverage < COVERAGE_THRESHOLD (%)   | 30 min
#   mutation-testing      | Stryker mutation score < 95%                 | 120 min
#   performance-check     | Any Gen2 allocation in ZeroAlloc benchmarks  | 60 min
#   audit-summary         | Any of the above gates fail                  | 5 min
#
# EXPECTED RUN TIMES (approximate)
# --------------------------------
#   Fast path (build+test only):     ~10 min
#   Full pipeline (all gates):       ~90-180 min (mutation testing dominates)
#   Performance check:               ~30-45 min
#
# HOW TO UPDATE BASELINES
# -----------------------
#   1. InspectCode baseline: Update INSPECTCODE_BASELINE env var below.
#      Run `jb inspectcode` locally and count WARNING+ issues.
#   2. dupFinder baseline:   Update DUPFINDER_BASELINE env var below.
#      Run `jb dupfinder` locally and count duplicates with cost >= 100.
#   3. Coverage threshold:   Update COVERAGE_THRESHOLD env var below.
#      Check current coverage in dotCover HTML report.
#   4. Mutation score:       Update --break-at in mutation-testing job.
#   5. Gen2 allocations:     Zero tolerance -- no configuration needed.
#
# =============================================================================

name: DW Military-Grade Audit

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
  workflow_call:

# Cancel in-progress runs for the same branch/PR to save runner minutes
concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release
  # ── Baseline Thresholds (calibrated during Plan 02 gate verification) ──
  INSPECTCODE_BASELINE: '0'
  DUPFINDER_BASELINE: '0'
  COVERAGE_THRESHOLD: '0'

jobs:
  # ──────────────────────────────────────────────────────────────
  # Stage 1: Build + Unit Tests (fast gate -- blocks everything)
  # ──────────────────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build Solution (Release)
      run: dotnet build -c ${{ env.CONFIGURATION }} --no-restore /p:TreatWarningsAsErrors=true

    - name: Run All Tests
      run: dotnet test -c ${{ env.CONFIGURATION }} --no-build --logger "trx;LogFileName=test-results.trx" --results-directory ./test-results

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: ./test-results/*.trx
        retention-days: 30

    - name: Upload Build Output
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: |
          **/bin/Release/
          !**/obj/
        retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # Stage 2a: Coyote Concurrency Testing (1000 iterations)
  # ──────────────────────────────────────────────────────────────
  coyote-concurrency:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install Coyote CLI
      run: dotnet tool install -g Microsoft.Coyote.CLI

    - name: Restore and Build
      run: dotnet build -c ${{ env.CONFIGURATION }} DataWarehouse.Hardening.Tests/

    - name: Run Coyote (1000 iterations)
      run: |
        coyote test ./DataWarehouse.Hardening.Tests/bin/Release/net10.0/DataWarehouse.Hardening.Tests.dll \
          --iterations 1000 \
          --max-steps 10000 \
          --timeout 3600 \
          --output ./coyote-results/ \
          2>&1 | tee coyote-output.log

        # Check for any bugs found
        if grep -q "found [1-9]" coyote-output.log; then
          echo "::error::Coyote found concurrency bugs! See output above."
          exit 1
        fi

    - name: Upload Coyote Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coyote-results
        path: |
          ./coyote-results/
          ./coyote-output.log
        retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # Stage 2b: Static Analysis (JetBrains InspectCode + dupFinder)
  # ──────────────────────────────────────────────────────────────
  static-analysis:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install JetBrains CLI Tools
      run: |
        dotnet tool install -g JetBrains.ReSharper.GlobalTools

    - name: Run InspectCode
      run: |
        jb inspectcode DataWarehouse.slnx \
          --output=inspectcode-results.xml \
          --format=Xml \
          --severity=WARNING \
          --no-build \
          2>&1 | tee inspectcode-output.log || true

    - name: Check InspectCode Threshold
      run: |
        if [ -f inspectcode-results.xml ]; then
          ISSUE_COUNT=$(python3 -c "
        import xml.etree.ElementTree as ET
        tree = ET.parse('inspectcode-results.xml')
        root = tree.getroot()
        # Count all Issue elements (WARNING severity and above)
        issues = root.findall('.//Issue')
        print(len(issues))
        " 2>/dev/null || echo "0")

          echo "InspectCode issues found: $ISSUE_COUNT (baseline: ${{ env.INSPECTCODE_BASELINE }})"
          if [ "$ISSUE_COUNT" -gt "${{ env.INSPECTCODE_BASELINE }}" ]; then
            echo "::error::InspectCode found $ISSUE_COUNT issues, exceeding baseline of ${{ env.INSPECTCODE_BASELINE }}"
            exit 1
          fi
          echo "InspectCode: PASS (${ISSUE_COUNT} <= ${{ env.INSPECTCODE_BASELINE }})"
        else
          echo "::warning::inspectcode-results.xml not found -- skipping threshold check"
        fi

    - name: Run dupFinder
      run: |
        jb dupfinder DataWarehouse.slnx \
          --output=dupfinder-results.xml \
          --show-text \
          --discard-cost=100 \
          2>&1 | tee dupfinder-output.log || true

    - name: Check dupFinder Threshold
      run: |
        if [ -f dupfinder-results.xml ]; then
          DUP_COUNT=$(python3 -c "
        import xml.etree.ElementTree as ET
        tree = ET.parse('dupfinder-results.xml')
        root = tree.getroot()
        # Count Duplicate elements with cost >= 100
        duplicates = root.findall('.//Duplicate')
        high_cost = [d for d in duplicates if int(d.get('Cost', '0')) >= 100]
        print(len(high_cost))
        " 2>/dev/null || echo "0")

          echo "dupFinder duplicates found (cost >= 100): $DUP_COUNT (baseline: ${{ env.DUPFINDER_BASELINE }})"
          if [ "$DUP_COUNT" -gt "${{ env.DUPFINDER_BASELINE }}" ]; then
            echo "::error::dupFinder found $DUP_COUNT duplicates (cost >= 100), exceeding baseline of ${{ env.DUPFINDER_BASELINE }}"
            exit 1
          fi
          echo "dupFinder: PASS (${DUP_COUNT} <= ${{ env.DUPFINDER_BASELINE }})"
        else
          echo "::warning::dupfinder-results.xml not found -- skipping threshold check"
        fi

    - name: Upload Static Analysis Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: static-analysis-results
        path: |
          inspectcode-results.xml
          dupfinder-results.xml
          inspectcode-output.log
          dupfinder-output.log
        retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # Stage 2c: Code Coverage (dotCover via dotnet-coverage)
  # ──────────────────────────────────────────────────────────────
  code-coverage:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install dotCover CLI
      run: dotnet tool install -g JetBrains.dotCover.CommandLineTools

    - name: Run dotCover Coverage
      run: |
        dotnet dotcover test \
          --dcOutput=coverage-report.html \
          --dcReportType=HTML \
          --dcFilters="+:DataWarehouse.*;-:*.Tests;-:*.Benchmarks" \
          -- -c ${{ env.CONFIGURATION }} \
          2>&1 | tee dotcover-output.log

    - name: Check Coverage Threshold
      run: |
        # Extract coverage percentage from dotCover output log
        COVERAGE=$(grep -oP 'Overall coverage: \K[0-9]+' dotcover-output.log 2>/dev/null || echo "")
        if [ -n "$COVERAGE" ]; then
          echo "dotCover coverage: ${COVERAGE}% (threshold: ${{ env.COVERAGE_THRESHOLD }}%)"
          if [ "$COVERAGE" -lt "${{ env.COVERAGE_THRESHOLD }}" ]; then
            echo "::error::Code coverage ${COVERAGE}% is below threshold of ${{ env.COVERAGE_THRESHOLD }}%"
            exit 1
          fi
          echo "Coverage: PASS (${COVERAGE}% >= ${{ env.COVERAGE_THRESHOLD }}%)"
        else
          echo "::warning::Could not extract coverage percentage -- skipping threshold check"
        fi

    - name: Upload Coverage Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          coverage-report.html
          dotcover-output.log
        retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # Stage 3: Stryker Mutation Testing (expensive -- runs after all others pass)
  # ──────────────────────────────────────────────────────────────
  mutation-testing:
    needs: [coyote-concurrency, static-analysis, code-coverage]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install Stryker
      run: dotnet tool install -g dotnet-stryker

    - name: Restore and Build
      run: dotnet build -c ${{ env.CONFIGURATION }}

    - name: Run Stryker Mutation Testing
      working-directory: ./DataWarehouse.Hardening.Tests
      run: |
        dotnet-stryker \
          --break-at 95 \
          --reporters "['html', 'json', 'progress']" \
          --output ../stryker-results/ \
          2>&1 | tee ../stryker-output.log

    - name: Upload Stryker Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: stryker-results
        path: |
          stryker-results/
          stryker-output.log
        retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # Stage 4: Performance Baseline Check (BenchmarkDotNet)
  # ──────────────────────────────────────────────────────────────
  performance-check:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Run BenchmarkDotNet (ZeroAlloc focus)
      run: |
        dotnet run -c ${{ env.CONFIGURATION }} --project Benchmarks/ -- \
          --filter '*ZeroAlloc*' \
          --exporters json \
          --artifacts ./benchmark-results/ \
          2>&1 | tee benchmark-output.log || true

    - name: Check for Gen2 Regressions (hard gate)
      run: |
        # Parse benchmark JSON for Gen2 allocations on zero-allocation paths
        FOUND_JSON=false
        for f in benchmark-results/results/*.json; do
          [ -f "$f" ] && FOUND_JSON=true && break
        done

        if [ "$FOUND_JSON" = "true" ]; then
          python3 -c "
        import json, glob, sys
        failures = []
        for f in glob.glob('benchmark-results/results/*.json'):
            data = json.load(open(f))
            for b in data.get('Benchmarks', []):
                gen2 = b.get('Statistics', {}).get('Gen2Collections', 0)
                name = b.get('Method', 'unknown')
                if gen2 > 0:
                    failures.append(f'{name}: {gen2} Gen2 collections')
        if failures:
            for fail in failures:
                print(f'FAIL: {fail}')
            sys.exit(1)
        print('All zero-allocation paths clean -- no Gen2 collections detected.')
          "
          if [ $? -ne 0 ]; then
            echo "::error::Gen2 allocation detected in zero-alloc benchmark paths -- merge blocked"
            exit 1
          fi
        else
          echo "::warning::No benchmark results found -- skipping Gen2 check"
        fi

    - name: Upload Benchmark Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: |
          benchmark-results/
          benchmark-output.log
        retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # Final: Summary Status Check (REQUIRED for branch protection)
  # ──────────────────────────────────────────────────────────────
  audit-summary:
    if: always()
    needs: [build-and-test, coyote-concurrency, static-analysis, code-coverage, mutation-testing, performance-check]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - name: Aggregate Gate Results
      run: |
        echo "=== DW Military-Grade Audit Summary ==="
        echo ""
        echo "Gate Results:"
        echo "  Build & Test:     ${{ needs.build-and-test.result }}"
        echo "  Coyote:           ${{ needs.coyote-concurrency.result }}"
        echo "  Static Analysis:  ${{ needs.static-analysis.result }}"
        echo "  Code Coverage:    ${{ needs.code-coverage.result }}"
        echo "  Mutation Testing: ${{ needs.mutation-testing.result }}"
        echo "  Performance:      ${{ needs.performance-check.result }}"
        echo ""

        FAILED=false

        # Gate 1: Build + Tests (CRITICAL -- always required)
        if [[ "${{ needs.build-and-test.result }}" == "failure" ]]; then
          echo "::error::GATE FAILED: build-and-test"
          FAILED=true
        fi

        # Gate 2: Coyote concurrency (CRITICAL -- concurrency bugs block merge)
        if [[ "${{ needs.coyote-concurrency.result }}" == "failure" ]]; then
          echo "::error::GATE FAILED: coyote-concurrency"
          FAILED=true
        fi

        # Gate 3: Static analysis (InspectCode + dupFinder thresholds)
        if [[ "${{ needs.static-analysis.result }}" == "failure" ]]; then
          echo "::error::GATE FAILED: static-analysis (InspectCode/dupFinder threshold exceeded)"
          FAILED=true
        fi

        # Gate 4: Code coverage
        if [[ "${{ needs.code-coverage.result }}" == "failure" ]]; then
          echo "::error::GATE FAILED: code-coverage (below threshold)"
          FAILED=true
        fi

        # Gate 5: Mutation testing (Stryker score < 95%)
        if [[ "${{ needs.mutation-testing.result }}" == "failure" ]]; then
          echo "::error::GATE FAILED: mutation-testing (Stryker score below 95%)"
          FAILED=true
        fi

        # Gate 6: Performance (Gen2 allocation in zero-alloc paths)
        if [[ "${{ needs.performance-check.result }}" == "failure" ]]; then
          echo "::error::GATE FAILED: performance-check (Gen2 allocation detected)"
          FAILED=true
        fi

        if [ "$FAILED" = "true" ]; then
          echo ""
          echo "::error::One or more audit gates failed -- merge blocked"
          exit 1
        fi

        echo "All 6 audit gates passed -- merge allowed."

  # ─────────────────────────────────────────────────────────────────────────
  # Branch Protection Setup
  # ─────────────────────────────────────────────────────────────────────────
  # To enforce this pipeline as a merge gate:
  #
  #   1. Go to: Settings -> Branches -> Branch protection rules
  #   2. Add rule for: main (or master)
  #   3. Enable:
  #      - [x] Require status checks to pass before merging
  #        - Required check: "audit-summary"
  #      - [x] Require branches to be up to date before merging
  #      - [x] Require conversation resolution before merging
  #      - [x] Dismiss stale pull request approvals when new commits are pushed
  #      - [x] Require review from code owners (optional, recommended)
  #   4. Save changes
  #
  # The "audit-summary" job is the ONLY required check. It aggregates all
  # gate results and fails if ANY gate fails. This means GitHub only needs
  # one required status check, but all 6 gates are enforced.
  # ─────────────────────────────────────────────────────────────────────────
